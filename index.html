<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Playable_Final_Version</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #gameCanvas {
            position: relative;
            width: 100vw; height: 177.77vw;
            max-height: 100vh; max-width: 56.25vh;
            background: #111; overflow: hidden;
        }

        #bg { 
            position: absolute; top: 50%; left: 50%; 
            min-width: 100%; min-height: 100%; 
            transform: translate(-50%, -50%); 
            object-fit: cover; pointer-events: none;
        }
        
        #car { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; z-index: 15; pointer-events: none; }
        #woman { position: absolute; bottom: 46%; left: 20%; width: 25%; transition: all 0.5s ease-out; z-index: 12; pointer-events: none; }
        #man { position: absolute; bottom: 46%; left: 0%; width: 25%; transition: all 0.8s ease-out; z-index: 10; pointer-events: none;}

        /* Обмежена зона тапа лише на дівчині */
        .girl-container {
            position: absolute; 
            bottom: 0; 
            left: 50%;
            transform: translateX(-50%); 
            width: 45%; 
            height: 55%; 
            z-index: 20;
            pointer-events: auto;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            /* background: rgba(0, 255, 0, 0.2); */ /* Розкоментуйте для тесту зони */
        }
        
        .girl-container img { 
            position: absolute; 
            bottom: 0; 
            left: -60%;
            
            width: 225%; 
            height: auto; 
            pointer-events: none;
        }
        
        #girlOutline { z-index: 21; filter: drop-shadow(0 0 12px #0f0); transition: opacity 0.3s; }

        .pulse { animation: pulseEffect 2s infinite ease-in-out; }
        @keyframes pulseEffect { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }

        #topLabel { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); width: 85%; z-index: 30; pointer-events: none; }
        #callToAction { position: absolute; bottom: 55%; left: 50%; transform: translateX(-50%); width: 65%; z-index: 30; pointer-events: none; }
        #arrow { position: absolute; bottom: 45%; left: 50%; transform: translateX(-50%); width: 15%; z-index: 31; pointer-events: none; }

        .splash-text { position: absolute; z-index: 100; pointer-events: none; }
        
        .muteBtn { 
            position: absolute; top: 15px; right: 15px; 
            width: 40px; height: 40px; border: none; 
            background: rgba(0,0,0,0.5); color: #fff; 
            border-radius: 50%; z-index: 200; cursor: pointer; 
        }

        .darkOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 150; }

        #finalBtn { 
            position: absolute; bottom: 45%; left: 50%; 
            transform: translateX(-50%) scale(0); 
            width: 75%; cursor: pointer; z-index: 201; 
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        #finalBtn.show { 
            transform: translateX(-50%) scale(1); 
            animation: finalPulse 1.5s infinite ease-in-out 0.6s;
        }

        @keyframes finalPulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
        }

        /* Аніме-ефект: прозорий та пульсуючий */
        #animeEffect {
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; z-index: 18; 
            opacity: 0; pointer-events: none; object-fit: cover;
            mix-blend-mode: multiply; 
        }

        .anime-active {
            opacity: 0.3 !important; /* Насиченість ліній */
            animation: speedLinesPulse 4s infinite ease-in-out;
        }

        @keyframes speedLinesPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>

<div id="gameCanvas">
    <img id="bg" src="assets/bg.webp">
    <img id="woman" src="assets/woman.webp">
    <img id="man" src="assets/man.webp">
    <img id="car" src="assets/car.webp">
    
    <img id="animeEffect" src="assets/anime_lines.webp">

    <div class="girl-container" id="clickableGirl">
        <img id="girlOutline" src="assets/girl_outline.webp" class="pulse">
        <img id="girl" src="assets/girl.webp" class="pulse">
    </div>
    
    <img id="topLabel" src="assets/top_label.webp">
    <img id="callToAction" src="assets/cta.webp">
    <img id="arrow" src="assets/arrow.webp">
    
    <button class="muteBtn" id="muteBtn">🔊</button>
    <div class="darkOverlay" id="overlay"></div>
    <img id="finalBtn" src="assets/play_button.webp" onclick="window.open('https://google.com', '_top')">
</div>

<audio id="bgMusic" src="assets/bg.mp3" loop playsinline></audio>
<audio id="tapSound" src="assets/tap.mp3"></audio>
<audio id="stopSound" src="assets/stop.mp3"></audio>
<audio id="winSound" src="assets/win.mp3"></audio>

<script>
    const girl = document.getElementById('girl');
    const outline = document.getElementById('girlOutline');
    const woman = document.getElementById('woman');
    const man = document.getElementById('man');
    const overlay = document.getElementById('overlay');
    const finalBtn = document.getElementById('finalBtn');
    const bgMusic = document.getElementById('bgMusic');
    const muteBtn = document.getElementById('muteBtn');
    const tapSound = document.getElementById('tapSound');
    const stopSound = document.getElementById('stopSound');
    const winSound = document.getElementById('winSound');
    const girlContainer = document.getElementById('clickableGirl');
    const canvas = document.getElementById('gameCanvas');
    const animeImg = document.getElementById('animeEffect');

    let taps = 0;
    let stopTimer;
    let isFinished = false;
    let splashSide = 1;
    let stopSoundPlayed = false;

    // Налаштування музики
    bgMusic.volume = 0.05;

    // UI Animations
    document.getElementById('callToAction').animate([{ transform: 'translateX(-50%) scale(1)' }, { transform: 'translateX(-50%) scale(1.1)' }], { duration: 800, iterations: Infinity, direction: 'alternate', easing: 'ease-in-out' });
    document.getElementById('arrow').animate([{ transform: 'translateX(-50%) translateY(0)' }, { transform: 'translateX(-50%) translateY(15px)' }], { duration: 800, iterations: Infinity, direction: 'alternate', easing: 'ease-in-out' });

    muteBtn.onclick = (e) => {
        e.stopPropagation();
        bgMusic.muted = !bgMusic.muted;
        muteBtn.innerText = bgMusic.muted ? '🔇' : '🔊';
    };

    function handleStopTapping() {
        if (isFinished || stopSoundPlayed) return;
        stopSound.currentTime = 0;
        stopSound.play().catch(() => {});
        girl.classList.add('pulse');
        outline.classList.add('pulse');
        stopSoundPlayed = true;
    }

    girlContainer.addEventListener('pointerdown', (e) => {
        e.stopPropagation();
        if(isFinished) return;
    
        //stopSoundPlayed = false;
        clearTimeout(stopTimer);
        
        taps++;

        if(taps === 1) {
            bgMusic.play().catch(() => {});
            document.getElementById('callToAction').style.display = 'none';
            document.getElementById('arrow').style.display = 'none';
            girl.classList.remove('pulse');
            outline.classList.remove('pulse');
            woman.src = "assets/woman_reaction.webp";
        }

        // Tap Sound
        const s = tapSound.cloneNode();
        s.volume = 0.6;
        s.play().catch(() => {});

        // Girl Jump
        girlContainer.animate([
            { transform: 'translateX(-50%) translateY(0)' },
            { transform: 'translateX(-50%) translateY(40px)' },
            { transform: 'translateX(-50%) translateY(0)' }
        ], { duration: 400, easing: 'ease-out' });

        // Woman Approach
        const currentScale = 1 + (taps * 0.12); 
        const currentBottom = (46 - taps * 1.5) + "%"; 
        woman.style.transform = `scale(${currentScale})`;
        woman.style.bottom = currentBottom;

        outline.style.opacity = 1 - (taps * 0.2);
        stopTimer = setTimeout(handleStopTapping, 2000);

        // Splash Image
        const splash = document.createElement('img');
        splash.src = 'assets/splash.webp'; 
        splash.className = 'splash-text';
        splash.style.left = (splashSide > 0 ? 65 : 5) + '%'; 
        splash.style.top = '60%'; 
        splash.style.width = '30%';
        canvas.appendChild(splash);

        splash.animate([
            { opacity: 0, transform: 'translateY(0) scale(0.5)' },
            { opacity: 1, transform: 'translateY(-100px) scale(1.2)', offset: 0.3 },
            { opacity: 0, transform: 'translateY(-200px) scale(1.4)' }
        ], { duration: 1200, easing: 'ease-out' });

        setTimeout(() => splash.remove(), 1200);
        splashSide *= -1;

        if(taps === 5) {
            isFinished = true;
            clearTimeout(stopTimer);
            
            // Фінальні ефекти
            winSound.volume = 0.8;
            winSound.play().catch(() => {});
            animeImg.classList.add('anime-active');
            
            canvas.animate([
                { transform: 'translate(3px, 3px)' },
                { transform: 'translate(-3px, -5px)' },
                { transform: 'translate(0, 0)' }
            ], { duration: 250 });

            girl.src = "assets/girl2.webp"; 
            woman.src = "assets/woman2.webp"; 
            man.src = "assets/man2.webp"; 
            
            man.style.transform = "scale(1.5)";
            man.style.left = "10%"; man.style.bottom = "42%";
            woman.style.left = "35%"; woman.style.bottom = "38%";
            woman.style.transform = "scale(2.0)";

            document.getElementById('topLabel').style.opacity = "0";
            overlay.style.transition = "opacity 1s"; 
            overlay.style.opacity = "0.4"; 
            
            setTimeout(() => finalBtn.classList.add('show'), 500);
        }
    });
</script>
</body>
</html>
