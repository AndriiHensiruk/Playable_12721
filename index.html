<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Playable_Tap_Fixed</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #gameCanvas {
            position: relative;
            width: 100vw; height: 177.77vw;
            max-height: 100vh; max-width: 56.25vh;
            background: #111; overflow: hidden;
        }

        #bg { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); object-fit: cover; }
        #car { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; z-index: 15; pointer-events: none; }
        #woman { position: absolute; bottom: 46%; left: 20%; width: 25%; transition: all 0.5s ease-out; z-index: 12; }
        #man { position: absolute; bottom: 46%; left: 0%; width: 25%; transition: all 0.8s ease-out; z-index: 10; }

        .girl-container {
            position: absolute; bottom: 0; left: 50%;
            transform: translateX(-50%); width: 100%; 
            z-index: 20; pointer-events: none;
            will-change: transform;
        }
        .girl-container img { position: absolute; bottom: 0; left: 0; width: 100%; height: auto; }
        #girlOutline { z-index: 21; filter: drop-shadow(0 0 12px #0f0); transition: opacity 0.3s; }

        .pulse { animation: pulseEffect 2s infinite ease-in-out; }
        @keyframes pulseEffect { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }

        #topLabel { position: absolute; top: 5%; left: 50%; transform: translateX(-50%); width: 85%; z-index: 30; }
        #callToAction { position: absolute; bottom: 55%; left: 50%; transform: translateX(-50%); width: 65%; z-index: 30; }
        #arrow { position: absolute; bottom: 45%; left: 50%; transform: translateX(-50%); width: 15%; z-index: 31; }

        .splash-text { position: absolute; z-index: 100; pointer-events: none; }
        .muteBtn { position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; border: none; background: rgba(0,0,0,0.5); color: #fff; border-radius: 50%; z-index: 200; cursor: pointer; }
        .darkOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 150; }
        #finalBtn { position: absolute; bottom: 45%; left: 50%; transform: translateX(-50%) scale(0); width: 75%; cursor: pointer; z-index: 201; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #finalBtn.show { transform: translateX(-50%) scale(1); }
        canvas.particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 160; }
    </style>
</head>
<body>

<div id="gameCanvas">
    <img id="bg" src="assets/bg.webp">
    <img id="woman" src="assets/woman.webp">
    <img id="man" src="assets/man.webp">
    <img id="car" src="assets/car.webp">
    
    <div class="girl-container">
        <img id="girlOutline" src="assets/girl_outline.webp" class="pulse">
        <img id="girl" src="assets/girl.webp" class="pulse">
    </div>
    
    <img id="topLabel" src="assets/top_label.webp">
    <img id="callToAction" src="assets/cta.webp">
    <img id="arrow" src="assets/arrow.webp">
    
    <button class="muteBtn" id="muteBtn">🔊</button>
    <div class="darkOverlay" id="overlay"></div>
    <canvas class="particles" id="particles"></canvas>
    <img id="finalBtn" src="assets/play_button.webp">
</div>

<audio id="bgMusic" src="assets/bg.mp3" loop muted playsinline webkit-playsinline></audio>
<audio id="tapSound" src="assets/tap.mp3"></audio>
<audio id="stopSound" src="assets/stop.mp3"></audio>

<script>
    const girl = document.getElementById('girl');
    const outline = document.getElementById('girlOutline');
    const woman = document.getElementById('woman');
    const man = document.getElementById('man');
    const overlay = document.getElementById('overlay');
    const finalBtn = document.getElementById('finalBtn');
    const bgMusic = document.getElementById('bgMusic');
    const muteBtn = document.getElementById('muteBtn');
    const tapSound = document.getElementById('tapSound');
    const stopSound = document.getElementById('stopSound');
    const girlContainer = document.querySelector('.girl-container');
    const canvas = document.getElementById('gameCanvas');

    let taps = 0;
    let stopTimer;
    let isFinished = false;
    let splashSide = 1;
    let audioUnlocked = false;


    // Анімації UI
    document.getElementById('callToAction').animate([{ transform: 'translateX(-50%) scale(1)' }, { transform: 'translateX(-50%) scale(1.1)' }], { duration: 800, iterations: Infinity, direction: 'alternate', easing: 'ease-in-out' });
    document.getElementById('arrow').animate([{ transform: 'translateX(-50%) translateY(0)' }, { transform: 'translateX(-50%) translateY(15px)' }], { duration: 800, iterations: Infinity, direction: 'alternate', easing: 'ease-in-out' });

    function unlockAudio() {
        if (audioUnlocked) return;

        bgMusic.muted = false;
        bgMusic.volume = 0.051;

        const playAttempt = () => {
            bgMusic.play()
                .then(() => {
                    audioUnlocked = true;
                    muteBtn.innerText = '🔊';
                })
                .catch(() => {
                    // fallback для iOS / WebView
                    setTimeout(playAttempt, 150);
                });
        };

        playAttempt();
    }

    // 🔇 КНОПКА (єдиний дозволений entry point)
    muteBtn.onclick = (e) => {
        e.stopPropagation();

        if (!audioUnlocked) {
            unlockAudio();
            return;
    }

    bgMusic.muted = !bgMusic.muted;
    muteBtn.innerText = bgMusic.muted ? '🔊' : '🔇';
};

    function handleStopTapping() {
        if (isFinished) return;
        stopSound.currentTime = 0;
        stopSound.play().catch(() => {});
        girl.classList.add('pulse');
        outline.classList.add('pulse');
    }   

    canvas.addEventListener('pointerdown', (e) => {
        if(isFinished || e.target.id === 'muteBtn' || e.target.id === 'finalBtn') return;
        
        clearTimeout(stopTimer);
        taps++;

        if(taps === 1) {
        
            const playPromise = bgMusic.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Автоплей заблоковано, пробуємо ще раз при наступному тапі");
                });
            }
            
            bgMusic.volume = 0.05;
            document.getElementById('callToAction').style.display = 'none';
            document.getElementById('arrow').style.display = 'none';
            girl.classList.remove('pulse');
            outline.classList.remove('pulse');
            woman.src = "assets/woman_reaction.webp";
        }

        // Звук тапа (миттєво)
        const s = tapSound.cloneNode();
        s.volume = 0.7;
        s.play().catch(() => {});

        // Анімація присідання основної дівчини
        girlContainer.animate([
            { transform: 'translateX(-50%) translateY(0) scale(1)' },
            { transform: 'translateX(-50%) translateY(90px) scale(1.02)' },
            { transform: 'translateX(-50%) translateY(0) scale(1)' }
        ], { duration: 550, easing: 'ease-out' });

        // Жінка підходить (тільки збільшення та рух вниз)
        const currentScale = 1 + (taps * 0.08); 
        const currentBottom = (46 - taps * 1.2) + "%"; 
        
        woman.style.transition = "transform 0.4s ease-out, bottom 0.4s ease-out";
        woman.style.transform = `scale(${currentScale})`;
        woman.style.bottom = currentBottom;

        stopTimer = setTimeout(handleStopTapping, 2500);
        outline.style.opacity = 1 - (taps * 0.2);

        // Splash текст
        // --- ОНОВЛЕНИЙ СПЛЕШ-ТЕКСТ ---
        const splash = document.createElement('img');
        splash.src = 'assets/splash.webp'; 
        splash.className = 'splash-text';
        
        // Випадковий невеликий поворот для живості
        const randomRotation = (Math.random() - 0.5) * 20; 
        
        splash.style.left = (splashSide > 0 ? 70 : 15) + '%'; 
        splash.style.top = '65%'; 
        splash.style.width = '35%';
        canvas.appendChild(splash);

        splash.animate([
            { 
                opacity: 0, 
                transform: `translateY(0) scale(0.5) rotate(${randomRotation}deg)` 
            },
            { 
                opacity: 1, 
                transform: `translateY(-40px) scale(1.1) rotate(${randomRotation}deg)`, 
                offset: 0.2 
            },
            { 
                opacity: 1, 
                transform: `translateY(-80px) scale(1.2) rotate(${randomRotation}deg)`, 
                offset: 0.8 
            },
            { 
                opacity: 0, 
                transform: `translateY(-120px) scale(1.3) rotate(${randomRotation}deg)` 
            }
        ], { 
            duration: 1500, // Довше на екрані (1.5 сек)
            easing: 'ease-out' 
        });

        setTimeout(() => splash.remove(), 1500);
        splashSide *= -1;

        if(taps === 5) {
            isFinished = true;
            clearTimeout(stopTimer);
            triggerParticles();
            girl.src = "assets/girl2.webp"; 
            woman.src = "assets/woman2.webp"; 
            man.src = "assets/man2.webp"; 
            
            man.style.left = "10%"; man.style.bottom = "42%";
            woman.style.left = "35%"; woman.style.bottom = "38%";
            woman.style.transform = "scale(1.6)";

            setTimeout(() => {
                girl.src = "assets/girl3.webp"; 
                document.getElementById('topLabel').style.opacity = "0";
                overlay.style.transition = "opacity 1s"; overlay.style.opacity = "0.5"; 
                setTimeout(() => finalBtn.classList.add('show'), 400);
            }, 800);
        }
    });

    const pCanvas = document.getElementById('particles');
    const ctx = pCanvas.getContext('2d');
    let particles = [];

    function triggerParticles() {
        pCanvas.width = canvas.clientWidth; pCanvas.height = canvas.clientHeight;
        for(let i = 0; i < 70; i++) {
            particles.push({
                x: pCanvas.width / 2, y: pCanvas.height / 1.7,
                vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.8) * 15,
                life: 1.0, size: Math.random() * 15 + 5,
                color: ['#FFB6C1', '#FF69B4', '#FFFFFF'][Math.floor(Math.random() * 3)]
            });
        }
        renderParticles();
    }

    function renderParticles() {
        ctx.clearRect(0, 0, pCanvas.width, pCanvas.height);
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life -= 0.015;
            ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size/2, 0, Math.PI*2); ctx.fill();
            if(p.life <= 0) particles.splice(i, 1);
        });
        if(particles.length > 0) requestAnimationFrame(renderParticles);
    }


</script>
</body>
</html>
