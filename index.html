<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Playable_Fixed_Full</title>
    <style>
        body { 
            margin: 0; padding: 0; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; height: -webkit-fill-available; overflow: hidden; 
            font-family: sans-serif; 
        }
        
        #gameCanvas {
            position: relative; width: 100vw; height: 100vh;
            max-width: 56.25vh; aspect-ratio: 9/16;
            background: #111; overflow: hidden;
        }

        #bg { 
            position: absolute; top: 50%; left: 50%; 
            min-width: 100%; min-height: 100%; 
            transform: translate(-50%, -50%); object-fit: cover; 
        }

        #car { 
            position: absolute; bottom: 0; left: 50%;
            transform: translateX(-50%); width: 100%; 
            z-index: 15; pointer-events: none; 
        }
        
        #woman { 
            position: absolute; bottom: 48%; left: 20%; width: 25%; 
            transition: bottom 0.5s, transform 0.5s, left 0.5s; z-index: 12; 
        }

        #man { 
            position: absolute; bottom: 48%; left: 0%; width: 25%; 
            transition: all 0.8s ease-out; z-index: 10; 
        }

        .girl-container {
            position: absolute; bottom: 0; left: 50%;
            transform: translateX(-50%); width: 100%; 
            z-index: 20; pointer-events: none;
        }
        .girl-container img {
            position: absolute; bottom: 0; left: 0; width: 100%; height: auto;
        }

        #girlOutline { 
            z-index: 21; filter: drop-shadow(0 0 12px #0f0); 
            transition: opacity 0.3s; 
        }

        .pulse { animation: pulseEffect 2s infinite ease-in-out; }
        @keyframes pulseEffect {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        #topLabel { position: absolute; top: 8%; left: 50%; transform: translateX(-50%); width: 80%; z-index: 30; transition: opacity 0.5s; }
        #callToAction { position: absolute; bottom: 55%; left: 50%; transform: translateX(-50%); width: 65%; z-index: 30; animation: ctaSync 0.8s infinite alternate ease-in-out; }
        #arrow { position: absolute; bottom: 45%; left: 50%; transform: translateX(-50%); width: 15%; z-index: 31; animation: arrowSync 0.8s infinite alternate ease-in-out; }

        @keyframes ctaSync { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.1); } }
        @keyframes arrowSync { from { transform: translateX(-50%) translateY(0); } to { transform: translateX(-50%) translateY(15px); } }

        .splash-text { position: absolute; z-index: 100; pointer-events: none; }
        .muteBtn { position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; border: none; background: rgba(0,0,0,0.5); color: #fff; border-radius: 50%; cursor: pointer; z-index: 200; }
        .darkOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 150; }
        
        #finalBtn { 
            position: absolute; bottom: 45%; left: 50%; 
            transform: translateX(-50%) scale(0); width: 75%; 
            cursor: pointer; z-index: 201; 
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        #finalBtn.show { transform: translateX(-50%) scale(1); }
        
        canvas.particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 160; }
    </style>
</head>
<body>

<div id="gameCanvas">
    <img id="bg" src="assets/bg.webp">
    <img id="woman" src="assets/woman.webp">
    <img id="man" src="assets/man.webp">
    <img id="car" src="assets/car.webp">
    
    <div class="girl-container">
        <img id="girlOutline" src="assets/girl_outline.webp" class="pulse">
        <img id="girl" src="assets/girl.webp" class="pulse">
    </div>
    
    <img id="topLabel" src="assets/top_label.webp">
    <img id="callToAction" src="assets/cta.webp">
    <img id="arrow" src="assets/arrow.webp">
    
    <button class="muteBtn" id="muteBtn">🔊</button>
    <div class="darkOverlay" id="overlay"></div>
    <canvas class="particles" id="particles"></canvas>
    <img id="finalBtn" src="assets/play_button.webp">
</div>

<audio id="bgMusic" src="assets/bg.mp3" loop></audio>
<audio id="tapSound" src="assets/tap.mp3"></audio>
<audio id="stopSound" src="assets/stop.mp3"></audio>

<script>
    const girl = document.getElementById('girl');
    const outline = document.getElementById('girlOutline');
    const woman = document.getElementById('woman');
    const man = document.getElementById('man');
    const overlay = document.getElementById('overlay');
    const finalBtn = document.getElementById('finalBtn');
    const bgMusic = document.getElementById('bgMusic');
    const tapSound = document.getElementById('tapSound');
    const stopSound = document.getElementById('stopSound');
    const girlContainer = document.querySelector('.girl-container');
    const canvas = document.getElementById('gameCanvas');

    let taps = 0;
    let stopTimer;
    let isFinished = false;
    let splashSide = 1;
    bgMusic.volume = 0.15;

    function spawnSplash() {
        const s = document.createElement('img');
        s.src = 'assets/splash.webp'; 
        s.className = 'splash-text';
        s.style.left = (splashSide > 0 ? 75 : 25) + '%';
        s.style.top = '70%';
        s.style.width = '35%'; 
        const rotation = splashSide > 0 ? 15 : -15;
        canvas.appendChild(s);
        s.animate([
            { transform: `translate(-50%, -50%) scale(0) rotate(${rotation}deg)`, opacity: 0 },
            { transform: `translate(-50%, -50%) scale(1.1) rotate(${rotation * 1.2}deg)`, opacity: 1, offset: 0.5 },
            { transform: `translate(-50%, -50%) scale(1.3) rotate(${rotation * 1.5}deg)`, opacity: 0 }
        ], { duration: 600, easing: 'ease-out' });
        setTimeout(() => s.remove(), 600);
        splashSide *= -1;
    }

    function handleStopTapping() {
        if (isFinished) return;
        stopSound.currentTime = 0;
        stopSound.play().catch(() => {});
        girl.classList.add('pulse');
        outline.classList.add('pulse');
    }   

    canvas.addEventListener('pointerdown', (e) => {
        if(isFinished || e.target.id === 'muteBtn' || e.target.id === 'finalBtn') return;
        
        clearTimeout(stopTimer);
        taps++;

        if(taps === 1) {
            bgMusic.play().catch(() => {});
            document.getElementById('callToAction').style.display = 'none';
            document.getElementById('arrow').style.display = 'none';
            girl.classList.remove('pulse');
            outline.classList.remove('pulse');
            woman.src = "assets/woman_reaction.webp";
        }

        // Клонування звуку кроку (тап)
        const playStepSound = (isRising) => {
            const soundClone = tapSound.cloneNode();
            soundClone.volume = isRising ? 0.3 : 0.6;
            soundClone.playbackRate = 1.5;
            soundClone.play().catch(() => {});
            soundClone.onended = () => soundClone.remove();
        };

        // Подвійний звук для ефекту присідання
        playStepSound(false);
        setTimeout(() => { if(!isFinished) playStepSound(true); }, 200);

        // Повертаємо анімацію присідання (стрибка)
        girlContainer.animate([
            { transform: 'translateX(-50%) translateY(0) scale(1)' },
            { transform: 'translateX(-50%) translateY(80px) scale(1.02)' }, // 80px для візуального ефекту
            { transform: 'translateX(-50%) translateY(0) scale(1)' }
        ], { duration: 400, easing: 'ease-out' });

        // Таймер зупинки
        stopTimer = setTimeout(handleStopTapping, 500);

        outline.style.opacity = 1 - (taps * 0.2);
        spawnSplash();

        // Поступове наближення жінки
        woman.style.bottom = (48 - taps * 0.5) + "%"; 
        woman.style.transform = `scale(${1 + taps * 0.015})`;

        if(taps === 5) {
            isFinished = true;
            clearTimeout(stopTimer);
            triggerParticles();
            
            girl.src = "assets/girl2.webp"; 
            woman.src = "assets/woman2.webp"; 
            man.src = "assets/man2.webp"; 

            // Позиції фіналу
            man.style.left = "10%";  
            man.style.bottom = "43.5%";
            man.style.transform = "scale(1.2)";
                
            woman.style.bottom = "40.5%"; 
            woman.style.left = "35%";
            woman.style.transform = "scale(1.5)";

            setTimeout(() => {
                girl.src = "assets/girl3.webp"; 
                document.getElementById('topLabel').style.opacity = "0";
                overlay.style.transition = "opacity 1s";
                overlay.style.opacity = "0.5"; 
                setTimeout(() => finalBtn.classList.add('show'), 400);
            }, 800);
        }
    });

    // Сердечка
    const pCanvas = document.getElementById('particles');
    const ctx = pCanvas.getContext('2d');
    let particles = [];

    function drawHeart(ctx, x, y, size) {
        ctx.beginPath();
        const r = size / 2;
        ctx.moveTo(x, y + r);
        ctx.bezierCurveTo(x - r, y - r, x - size * 1.25, y + r / 2, x, y + size * 1.1);
        ctx.bezierCurveTo(x + size * 1.25, y + r / 2, x + r, y - r, x, y + r);
        ctx.fill();
    }

    function triggerParticles() {
        pCanvas.width = pCanvas.offsetWidth; 
        pCanvas.height = pCanvas.offsetHeight;
        for(let i = 0; i < 80; i++) {
            particles.push({
                x: pCanvas.width / 2,
                y: pCanvas.height / 1.6,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.7) * 14,
                life: 1.0,
                size: Math.random() * 15 + 8,
                color: ['#FFB6C1', '#FF69B4', '#FFFFFF', '#FFE4B5'][Math.floor(Math.random() * 4)],
                rotation: Math.random() * 6,
                spin: (Math.random() - 0.5) * 0.1
            });
        }
        renderParticles();
    }

    function renderParticles() {
        ctx.clearRect(0, 0, pCanvas.width, pCanvas.height);
        particles.forEach((p, i) => {
            p.vx *= 0.98; p.vy += 0.22;
            p.x += p.vx; p.y += p.vy;
            p.life -= 0.012;
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation += p.spin);
            drawHeart(ctx, 0, 0, p.size);
            ctx.restore();
            if(p.life <= 0) particles.splice(i, 1);
        });
        if(particles.length > 0) requestAnimationFrame(renderParticles);
    }

    document.getElementById('muteBtn').onclick = (e) => {
        e.stopPropagation();
        bgMusic.muted = !bgMusic.muted;
        e.target.innerText = bgMusic.muted ? '🔇' : '🔊';
    };
</script>
</body>
</html>
