<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no">
    <title>Playable_12721</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: sans-serif; 
        }
        
        #gameCanvas {
            position: relative;
            width: 100vw; height: 100vh;
            max-width: calc(100vh * 9/16);
            aspect-ratio: 9/16;
            background: #111;
            overflow: hidden;
        }

        #bg { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        #car { 
            position: absolute; 
            bottom: 0;
            right: 0; 
            width: 100%; 
            z-index: 15; 
            pointer-events: none; 
        }
        
       #woman { 
            position: absolute; 
            bottom: 48%; 
            left: 20%;   
            width: 25%; 
            transition: bottom 0.5s ease-out, transform 0.5s ease-out, left 0.5s ease-out; 
            z-index: 12; 
        }

        #man { 
            position: absolute; 
            bottom: 48%; 
            left: 0%;   /* Розмістили ліворуч від жінки, теж у вікні */
            width: 25%; 
            transition: all 0.8s ease-out; 
            z-index: 10; 
        }
        /* Контейнер для дівчини та обводки */
        .girl-container {
            position: absolute; bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 100%; z-index: 20;
            pointer-events: none;
            transform-origin: bottom center;
        }
        .girl-container img {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: auto;
        }
        #girl { width: 100%; z-index: 20; }
        #girlOutline { width: 100%;
             z-index: 21; 
             filter: drop-shadow(0 0 12px #0f0); 
             transition: opacity 0.3s; }

        .pulse { animation: pulseEffect 2s infinite ease-in-out; }
        @keyframes pulseEffect {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        #topLabel { 
            position: absolute; 
            top: 10%; left: 50%; 
            transform: translateX(-50%); 
            width: 80%; z-index: 30; 
            transition: opacity 0.5s; 
        }
        #callToAction { 
            position: absolute; 
            bottom: 55%; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 65%; 
            z-index: 30; 
            animation: ctaSync 0.8s infinite alternate ease-in-out; 
        }
        #arrow { 
            position: absolute; 
            bottom: 45%; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 15%; z-index: 31; 
            animation: arrowSync 0.8s infinite alternate ease-in-out; 
        }

        @keyframes ctaSync { 
            from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.1); } }
        @keyframes arrowSync { 
            from { transform: translateX(-50%) translateY(0); } to { transform: translateX(-50%) translateY(15px); } }

        .splash-text { 
            position: absolute; 
            z-index: 100; 
            pointer-events: none; 
        }
        .muteBtn { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            width: 45px; 
            height: 45px; 
            border: none; 
            background: rgba(0,0,0,0.4); 
            color: #fff; 
            border-radius: 50%; 
            cursor: pointer; 
            z-index: 200; 
        }
        
        .darkOverlay { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; 
            height: 100%; 
            background: black; 
            opacity: 0; 
            pointer-events: none; 
            z-index: 150; 
        }
        
        #finalBtn { 
            position: absolute; 
            bottom: 45%; 
            left: 50%; 
            transform: translateX(-50%) scale(0); 
            width: 75%; cursor: pointer; 
            z-index: 201; 
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        #finalBtn.show { transform: translateX(-50%) scale(1); }
        
        canvas.particles { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 160; 
        }
    </style>
</head>
<body>

<div id="gameCanvas">
    <img id="bg" src="assets/bg.webp">
    <img id="woman" src="assets/woman.webp">
    <img id="man" src="assets/man.webp">
    <img id="car" src="assets/car.webp">
    <!-- Контейнер -->
    <div class="girl-container">
        <img id="girlOutline" src="assets/girl_outline.webp" class="pulse">
        <img id="girl" src="assets/girl.webp" class="pulse">
    </div>
    
    <img id="topLabel" src="assets/top_label.webp">
    <img id="callToAction" src="assets/cta.webp">
    <img id="arrow" src="assets/arrow.webp">
    
    <button class="muteBtn" id="muteBtn">🔊</button>
    <div class="darkOverlay" id="overlay"></div>
    <canvas class="particles" id="particles"></canvas>
    <img id="finalBtn" src="assets/play_button.webp">
</div>

<audio id="bgMusic" src="assets/bg.mp3" loop></audio>
<audio id="tapSound" src="assets/tap.mp3"></audio>
<audio id="stopSound" src="assets/stop.mp3"></audio>


<script>
    const girl = document.getElementById('girl');
    const outline = document.getElementById('girlOutline');
    const woman = document.getElementById('woman');
    const man = document.getElementById('man');
    const overlay = document.getElementById('overlay');
    const finalBtn = document.getElementById('finalBtn');
    const bgMusic = document.getElementById('bgMusic');
    const tapSound = document.getElementById('tapSound');
    const stopSound = document.getElementById('stopSound');
    const girlContainer = document.querySelector('.girl-container');

    let taps = 0;
    let stopTimer;
    let isFinished = false;
    let splashSide = 1;
    bgMusic.volume = 0.1;

    function spawnSplash() {
        const s = document.createElement('img');
        s.src = 'assets/splash.webp'; 
        s.className = 'splash-text';
        const sideX = splashSide > 0 ? (50 + 25) : (50 - 25); 
        const posX = sideX; 
        const posY = 75; 
        s.style.left = posX + '%';
        s.style.top = posY + '%';
        s.style.width = '35%'; 
        const rotation = splashSide > 0 ? 15 : -15;
        document.getElementById('gameCanvas').appendChild(s);
        s.animate([
            { transform: `translate(-50%, -50%) scale(0) rotate(${rotation}deg)`, opacity: 0 },
            { transform: `translate(-50%, -50%) scale(1.1) rotate(${rotation * 1.2}deg)`, opacity: 1, offset: 0.5 },
            { transform: `translate(-50%, -50%) scale(1.3) rotate(${rotation * 1.5}deg)`, opacity: 0 }
        ], { duration: 600, easing: 'ease-out' });
        setTimeout(() => s.remove(), 600);
        splashSide *= -1;
    }

    function handleStopTapping() {
    if (isFinished) return; // Не граємо звук, якщо гра вже закінчена
    
    stopSound.currentTime = 0;
    stopSound.play().catch(() => {});
    
    // Можна додати візуальний ефект, наприклад, повернути жінку трохи назад
    // або знову включити пульсацію (pulse) для основної дівчини
    girl.classList.add('pulse');
    }   

   document.getElementById('gameCanvas').addEventListener('pointerdown', (e) => {
    if(isFinished || e.target.id === 'muteBtn' || e.target.id === 'finalBtn') return;
   
    clearTimeout(stopTimer);

    taps++;


    if(taps === 1) {
        bgMusic.play().catch(() => {});
        document.getElementById('callToAction').style.display = 'none';
        document.getElementById('arrow').style.display = 'none';
        girl.classList.remove('pulse');
        
        // Повертаємо реакцію жінки на перший клік
        woman.src = "assets/woman_reaction.webp";
    }

    const playTap = () => {
    const soundClone = tapSound.cloneNode(); 
    soundClone.volume = 1.0;                 
    soundClone.play();                       
    };
    playTap();
    // Анімація присідання основної дівчини
    const squatAnim = [
        { transform: 'translateX(-50%) translateY(0) scale(1)' },
        { transform: 'translateX(-50%) translateY(105px) scale(1.02)' },
        { transform: 'translateX(-50%) translateY(0) scale(1)' }
    ];
    girlContainer.animate(squatAnim, { duration: 400, easing: 'ease-out' });

    // ФУНКЦІЯ ДЛЯ ВІДТВОРЕННЯ (з клонуванням та пришвидшенням)
    const playStepSound = (isRising) => {
        const soundClone = tapSound.cloneNode();
        soundClone.volume = isRising ? 0.4 : 0.6; 
        
        soundClone.playbackRate = 1.5; 
        
        soundClone.play().catch(() => {});
        
        // Видаляємо клон з пам'яті після відтворення
        soundClone.onended = () => soundClone.remove();
    };

    // 1. Звук на початку (рух вниз)
    playStepSound(false);

    // 2. Звук через 200мс (початок руху вгору)
    setTimeout(() => {
        if (!isFinished) {
            playStepSound(true);
        }
    }, 200);

    if (!isFinished) {
        stopTimer = setTimeout(() => {
            handleStopTapping();
        }, 500); 
    }

    outline.style.opacity = 1 - (taps * 0.2);
    spawnSplash();

    woman.style.bottom = (48 - taps * 0.5) + "%"; 
    woman.style.transform = `scale(${1 + taps * 0.015})`;

    // ФІНАЛ (5-й тап)
    if(taps === 5) {
        isFinished = true;
        triggerParticles();
        girl.src = "assets/girl2.webp"; 

        woman.src = "assets/woman2.webp"; 
        man.src = "assets/man2.webp"; 

        man.style.right = "auto"; 
        man.style.left = "10%";  
        man.style.bottom = "43.5%";
        man.style.transform = "scale(1.2)";
            
        woman.style.bottom = "40.5%"; 
        woman.style.left = "35%";
        woman.style.transform = "scale(1.5)";

        setTimeout(() => {
            girl.src = "assets/girl3.webp";   
            
            document.getElementById('topLabel').style.opacity = "0";
            overlay.style.transition = "opacity 1s ease-in-out"; 
            overlay.style.opacity = "0.5"; 
            
            setTimeout(() => { 
                finalBtn.classList.add('show'); 
            }, 400);
        }, 800);
    }
});

    // --- Система часток (Сердечка) ---
    const pCanvas = document.getElementById('particles');
    const ctx = pCanvas.getContext('2d');
    let particles = [];

   
    function drawHeart(ctx, x, y, size) {
        ctx.beginPath();
        
        const r = size / 2; 
       
        ctx.moveTo(x, y + r);
        
        ctx.bezierCurveTo(x - r, y - r, x - size * 1.25, y + r / 2, x, y + size * 1.1);
       
        ctx.bezierCurveTo(x + size * 1.25, y + r / 2, x + r, y - r, x, y + r);
        ctx.closePath();
    }

    function triggerParticles() {
        pCanvas.width = pCanvas.offsetWidth; 
        pCanvas.height = pCanvas.offsetHeight;
        
        
        for(let i = 0; i < 100; i++) {
            particles.push({
                x: pCanvas.width / 2,
                y: pCanvas.height / 1.6, // Початок трохи вище
                // Розліт в сторони
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.7) * 14, // Поштовх вгору
                life: 1.0,
                
                size: Math.random() * 15 + 8,
                
                color: ['#FFB6C1', '#FF69B4', '#FFFFFF', '#FFE4B5'][Math.floor(Math.random() * 4)],
                rotation: Math.random() * Math.PI * 2,
                spin: (Math.random() - 0.5) * 0.1,
                
                baseAlpha: Math.random() * 0.5 + 0.5 
            });
        }
        renderParticles();
    }

    function renderParticles() {
        ctx.clearRect(0, 0, pCanvas.width, pCanvas.height);
        
        particles.forEach((p, i) => {
            // Фізика
            p.vx *= 0.98; 
            p.vy += 0.22; 
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.012; 
            p.rotation += p.spin;

            ctx.save();
            
            ctx.globalAlpha = p.baseAlpha * p.life;
            ctx.fillStyle = p.color;
            
            ctx.shadowBlur = 15;
            ctx.shadowColor = p.color;
            
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation);
            
            drawHeart(ctx, 0, 0, p.size);
            ctx.fill();
            
            ctx.restore();

            if(p.life <= 0) particles.splice(i, 1);
        });

        if(particles.length > 0) {
            requestAnimationFrame(renderParticles);
        }
    }

    const muteBtn = document.getElementById('muteBtn');

    muteBtn.addEventListener('click', (e) => {
        e.stopPropagation(); 
        
        if (bgMusic.muted) {
            bgMusic.muted = false;
            muteBtn.innerText = '🔊';
        } else {
            bgMusic.muted = true;
            muteBtn.innerText = '🔇';
        }
    });
</script>
</body>
</html>
